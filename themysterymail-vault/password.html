<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Case password — The Mystery Mail</title>
    <link rel="icon" href="images/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/vault.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__row">
        <a class="site-logo" href="https://www.themysterymail.com" target="_blank" rel="noopener noreferrer">
          <img class="site-logo__img" src="images/logo.png" width="220" height="48" alt="The Mystery Mail" />
        </a>
        <nav class="site-nav" aria-label="Main">
          <a href="https://www.themysterymail.com" target="_blank" rel="noopener noreferrer">Shop</a>
          <a href="index.html">Vault</a>
          <a class="btn-nav" href="https://www.themysterymail.com" target="_blank" rel="noopener noreferrer">Order a case</a>
        </nav>
      </div>
      <div class="site-strip"><span>The Mystery Mail Vault — player access</span></div>
    </header>

    <div class="site-main">
      <div class="vault-shell">
        <div class="vault-card vault-card--wide" id="pass-card">
          <div class="vault-brand">
            <h1 id="case-title">Case password</h1>
            <p id="case-sub">Enter the code from your materials.</p>
          </div>
          <form id="pass-form" novalidate>
            <span class="sr-only" id="pass-legend">One box per part of your code. Letters and numbers allowed; not case sensitive.</span>
            <div id="password-grid" class="password-grid" role="group" aria-labelledby="pass-legend"></div>
            <p class="hint" id="pass-hint"></p>
            <button type="submit" class="btn">Unlock vault</button>
            <p id="msg" class="msg error" role="alert"></p>
          </form>
          <a class="back" href="index.html">← Different username</a>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p>Bring the mystery home.</p>
        <div class="site-footer__links">
          <a href="https://www.themysterymail.com" target="_blank" rel="noopener noreferrer">themysterymail.com</a>
          <a href="index.html">Vault home</a>
        </div>
      </div>
    </footer>

    <script src="js/vault-core.js"></script>
    <script>
      (async function () {
        const params = new URLSearchParams(window.location.search);
        const gameId = params.get("game");
        const msg = document.getElementById("msg");
        if (!gameId) {
          window.location.href = "index.html";
          return;
        }
        if (getUserGate() !== gameId) {
          window.location.href = "index.html";
          return;
        }

        let data;
        try {
          data = await loadGames();
        } catch (e) {
          msg.textContent = "Could not load configuration.";
          return;
        }
        const game = (data.games || []).find((g) => g.id === gameId);
        if (!game) {
          window.location.href = "index.html";
          return;
        }

        document.getElementById("case-title").textContent = game.title || "Case password";

        const segs = game.passwordSegments || [];
        const cellCount = getPasswordCellCount(game);
        const maxChars = getMaxCharsPerCell(game);
        if (cellCount === 0) {
          msg.textContent = "This case has no password configured.";
          return;
        }

        document.getElementById("case-sub").textContent =
          "Enter the " +
          cellCount +
          "-part vault code for this case (one box per part).";
        document.getElementById("pass-hint").textContent =
          "Each box allows at most " +
          maxChars +
          " character(s). Letters and digits only; not case sensitive.";

        const grid = document.getElementById("password-grid");
        const expectedSegs = segs;
        const inputs = [];
        for (let i = 0; i < cellCount; i++) {
          const inp = document.createElement("input");
          inp.type = "text";
          inp.setAttribute("maxlength", String(maxChars));
          inp.setAttribute("inputmode", "text");
          inp.setAttribute("autocapitalize", "characters");
          inp.setAttribute("aria-label", "Part " + (i + 1) + " of " + cellCount);
          inp.dataset.idx = String(i);
          grid.appendChild(inp);
          inputs.push(inp);
        }

        function shouldAdvance(i, value) {
          if (value.length >= maxChars) return true;
          const exp = String(expectedSegs[i] || "").trim();
          if (exp.length === 1 && value.length >= 1) return true;
          return false;
        }

        function clearPasswordCellFeedback() {
          inputs.forEach(function (el) {
            el.classList.remove("pass-cell--ok", "pass-cell--bad");
          });
          msg.textContent = "";
        }

        inputs.forEach((input, i) => {
          input.addEventListener("input", () => {
            clearPasswordCellFeedback();
            let v = input.value.replace(/[^a-zA-Z0-9]/g, "");
            if (v.length > maxChars) v = v.slice(0, maxChars);
            input.value = v;
            if (shouldAdvance(i, v) && i < inputs.length - 1) inputs[i + 1].focus();
          });
          input.addEventListener("keydown", (ev) => {
            if (ev.key === "Backspace" && input.value === "" && i > 0) inputs[i - 1].focus();
          });
        });

        document.getElementById("pass-form").addEventListener("submit", function (e) {
          e.preventDefault();
          msg.textContent = "";
          msg.classList.remove("ok");
          msg.classList.add("error");
          const segments = inputs.map((el) => el.value);
          if (segments.some((s) => s.length > maxChars)) {
            inputs.forEach(function (el) {
              el.classList.remove("pass-cell--ok", "pass-cell--bad");
            });
            msg.textContent = "Each box allows at most " + maxChars + " character(s).";
            return;
          }
          if (checkPassword(game, segments)) {
            inputs.forEach(function (el) {
              el.classList.remove("pass-cell--ok", "pass-cell--bad");
            });
            setPasswordUnlocked(gameId);
            window.location.href = "directory.html?game=" + encodeURIComponent(gameId);
          } else {
            const wrongParts = [];
            for (let i = 0; i < cellCount; i++) {
              const ok = segmentMatches(expectedSegs[i] ?? "", segments[i] ?? "");
              inputs[i].classList.toggle("pass-cell--ok", ok);
              inputs[i].classList.toggle("pass-cell--bad", !ok);
              if (!ok) wrongParts.push(i + 1);
            }
            if (wrongParts.length === cellCount) {
              msg.textContent = "None of the parts match yet. Check each box.";
            } else if (wrongParts.length === 1) {
              msg.textContent =
                "Box " +
                wrongParts[0] +
                " still needs the right code. Green boxes are correct.";
            } else {
              msg.textContent =
                "Boxes " +
                wrongParts.join(", ") +
                " still need the right code. Green boxes are correct.";
            }
          }
        });
      })();
    </script>
  </body>
</html>
